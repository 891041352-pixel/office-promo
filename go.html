<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>正在前往淘宝店铺...</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #ff5000 0%, #ff6900 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .sub { opacity: .8; font-size: .85rem; margin-bottom: 28px; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: #fff; color: #ff5000; }
    .btn-tk {
      background: linear-gradient(135deg, #ff2d00, #ff7a00);
      color: #fff;
      font-size: 1.1rem;
    }
    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.45);
    }

    .tip {
      margin-top: 20px;
      font-size: .78rem;
      opacity: .6;
      line-height: 1.6;
    }

    .wechat-tip {
      display: none;
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,.75);
      z-index: 999;
      color: #fff;
      text-align: center;
      padding-top: 60px;
      font-size: 1.05rem;
      line-height: 2;
    }
    .wechat-tip.show { display: block; }
    .arrow { font-size: 2.5rem; }

    .success-msg {
      display: none;
      margin-top: 16px;
      padding: 10px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      font-size: .9rem;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>

<div class="box" id="mainBox">
  <div class="icon">🛒</div>
  <h2>正在前往淘宝店铺</h2>
  <p class="sub">激活办公室 - 正版软件密钥专卖店</p>

  <a class="btn btn-primary" id="btnApp">
    📱 打开手机淘宝 App
  </a>

  <a class="btn btn-tk" id="btnTK">
    🔑 复制淘口令（推荐）
  </a>

  <a class="btn btn-secondary" id="btnWeb">
    🌐 在浏览器中查看
  </a>

  <p class="tip">复制淘口令后，打开淘宝 App 自动弹出店铺</p>
  <div class="success-msg" id="successMsg">✅ 淘口令已复制！<br/>请打开手机淘宝 App</div>
</div>

<div class="wechat-tip" id="wechatTip">
  <div class="arrow">↗️</div>
  请点击右上角<br/>选择「在浏览器打开」<br/>即可打开淘宝 App
</div>

<script>
/*
 * 淘宝店铺跳转方案
 * 店铺：激活办公室（shop515102705）
 *
 * 三个层级：
 * 1. 淘口令   → 复制后打开淘宝 App 自动弹出（最可靠）
 * 2. 短链      → m.tb.cn 淘宝官方短链，打开后提示"打开App"
 * 3. taobao:// → 直接唤起 App（部分机型有效）
 */

// 淘宝短链（从 App 分享获取，打开后提示打开 App，无需登录）
const SHORT_URL = 'https://m.tb.cn/h.RIumfvgKR02Togn';

// 淘口令（从 App 分享获取）
const TAO_KOU_LING = '78eAGBgiY80xS💲 RIumfvgKR02Togn CZ007 激活办公室';

// 店铺 ID
const SHOP_ID = '515102705';

const ua = navigator.userAgent;
const isWechat  = /MicroMessenger/i.test(ua);
const isAndroid = /Android/i.test(ua);
const isIOS     = /iPhone|iPad|iPod/i.test(ua);
const isMobile  = isAndroid || isIOS;

/* ===== 按钮1：打开手机淘宝 App ===== */
document.getElementById('btnApp').addEventListener('click', function(e) {
  e.preventDefault();

  if (isWechat) {
    document.getElementById('wechatTip').classList.add('show');
    return;
  }

  if (isMobile) {
    // 先尝试 taobao:// schema 唤起
    window.location.href = 'taobao://shop.taobao.com/shop/shop_index.htm?shop_id=' + SHOP_ID;
    // 1.5 秒后检测是否唤起成功
    setTimeout(function() {
      if (!document.hidden) {
        // 唤起失败，跳短链（浏览器会提示打开App）
        window.location.href = SHORT_URL;
      }
    }, 1500);
  } else {
    // 电脑：直接打开短链
    window.open(SHORT_URL, '_blank');
  }
});

/* ===== 按钮2：复制淘口令（最推荐）===== */
document.getElementById('btnTK').addEventListener('click', function(e) {
  e.preventDefault();
  copyText(TAO_KOU_LING);
});

/* ===== 按钮3：在浏览器中查看 ===== */
document.getElementById('btnWeb').addEventListener('click', function(e) {
  e.preventDefault();
  // 直接跳短链，手机浏览器会提示"是否打开淘宝App"
  window.location.href = SHORT_URL;
});

/* ===== 复制函数 ===== */
function copyText(text) {
  // 方法1：Clipboard API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showSuccess();
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.opacity = '0';
  ta.style.fontSize = '16px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    var ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) {
      showSuccess();
    } else {
      promptCopy(text);
    }
  } catch(e) {
    document.body.removeChild(ta);
    promptCopy(text);
  }
}

function showSuccess() {
  var el = document.getElementById('successMsg');
  el.classList.add('show');
  // 尝试唤起淘宝
  if (isMobile && !isWechat) {
    setTimeout(function() {
      window.location.href = 'taobao://';
    }, 500);
  }
  setTimeout(function() { el.classList.remove('show'); }, 4000);
}

function promptCopy(text) {
  prompt('请手动复制以下淘口令，然后打开淘宝 App：', text);
}

/* ===== 微信提示关闭 ===== */
document.getElementById('wechatTip').addEventListener('click', function() {
  this.classList.remove('show');
});
</script>

</body>
</html>
