<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>正在前往淘宝店铺...</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #ff5000 0%, #ff6900 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .sub { opacity: .8; font-size: .85rem; margin-bottom: 28px; line-height: 1.6; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: #fff; color: #ff5000; }
    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.45);
    }
    .tip {
      margin-top: 20px;
      font-size: .78rem;
      opacity: .6;
      line-height: 1.6;
    }
    .wechat-tip {
      display: none;
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,.75);
      z-index: 999;
      color: #fff;
      text-align: center;
      padding-top: 60px;
      font-size: 1.05rem;
      line-height: 2;
    }
    .wechat-tip.show { display: block; }
    .arrow { font-size: 2.5rem; }
    #copyOk { display:none; margin-top:12px; font-size:.85rem; opacity:.9; }
  </style>
</head>
<body>

<div class="box" id="mainBox">
  <div class="icon">🛒</div>
  <h2>正在前往淘宝店铺</h2>
  <p class="sub">请选择打开方式</p>

  <a class="btn btn-primary" id="btnApp">
    📱 打开手机淘宝 App（推荐）
  </a>

  <a class="btn btn-secondary" id="btnCopy">
    📋 复制淘口令打开（最稳）
  </a>

  <a class="btn btn-secondary" id="btnWeb">
    🌐 在浏览器中打开（需登录）
  </a>

  <p class="tip" id="tipText">
    推荐：打开淘宝App → 自动弹出店铺<br/>
    备用：复制淘口令 → 打开淘宝自动识别
  </p>
  <p id="copyOk">✅ 淘口令已复制！请打开手机淘宝 App</p>
</div>

<div class="wechat-tip" id="wechatTip">
  <div class="arrow">↗️</div>
  请点击右上角<br/>选择「在浏览器打开」<br/>即可打开淘宝 App
</div>

<script>
// ====== 配置：请替换为你的真实店铺信息 ======
// 方式1：用店铺ID（你的店铺ID是 515102705）
var SHOP_ID     = '515102705';
// taobao:// 正确格式：直接打开店铺首页
var DEEP_LINK   = 'taobao://shop.taobao.com/shop/shop_index.htm?shop_id=' + SHOP_ID;
// 方式2：如果你有具体商品的ID，用这个（更可靠）
// var ITEM_ID = '123456789'; // 替换成你的商品ID
// var DEEP_LINK = 'taobao://item.taobao.com/item.htm?id=' + ITEM_ID;
// 手机网页版店铺链接（无需登录可浏览）
var WEB_URL     = 'https://m.tb.cn/h.RIumfvgKR02Togn';
// 淘口令（从淘宝App分享获得，复制后打开App自动识别）
var TAO_TOKEN   = '78eAGBgiY80xS';
// ================================================

var ua       = navigator.userAgent;
var isWechat = /MicroMessenger/i.test(ua);
var isAndroid = /Android/i.test(ua);
var isIOS    = /iPhone|iPad|iPod/i.test(ua);
var isMobile = isAndroid || isIOS;

// 点击「打开淘宝App」
document.getElementById('btnApp').addEventListener('click', function(e) {
  e.preventDefault();
  if (isWechat) {
    document.getElementById('wechatTip').classList.add('show');
    return;
  }
  openTaobao();
});

// 点击「复制淘口令」
document.getElementById('btnCopy').addEventListener('click', function(e) {
  e.preventDefault();
  copyToken();
});

// 点击「浏览器中打开」
document.getElementById('btnWeb').addEventListener('click', function(e) {
  e.preventDefault();
  window.open(WEB_URL, '_blank');
});

// 唤起淘宝App
function openTaobao() {
  // 先试 taobao:// 协议
  window.location.href = DEEP_LINK;
  // 1.8秒后如果还在当前页（App没唤起），提示用户
  setTimeout(function() {
    if (!document.hidden) {
      if (confirm('未能自动打开淘宝 App？\n点击「确定」复制淘口令，打开淘宝即可识别店铺')) {
        copyToken();
      }
    }
  }, 1800);
}

// 复制淘口令
function copyToken() {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(TAO_TOKEN).then(function() {
      showCopyOk();
    }).catch(function() {
      fallbackCopy(TAO_TOKEN);
    });
  } else {
    fallbackCopy(TAO_TOKEN);
  }
}

function showCopyOk() {
  var el = document.getElementById('copyOk');
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 5000);
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showCopyOk();
  } catch(e) {
    prompt('请手动复制以下淘口令：', text);
  }
  document.body.removeChild(ta);
}

// 页面加载后，手机端自动尝试唤起（延迟800ms）
if (isMobile && !isWechat) {
  setTimeout(function() {
    openTaobao();
  }, 800);
}

// 关闭微信提示
document.getElementById('wechatTip').addEventListener('click', function() {
  this.classList.remove('show');
});
</script>
</body>
</html>
