<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>前往淘宝店铺 - 正版软件密钥专卖店</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #ff5000 0%, #ff6900 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .sub { opacity: .8; font-size: .85rem; margin-bottom: 28px; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: #fff; color: #ff5000; }
    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.45);
    }
    .btn-taokouling {
      background: linear-gradient(135deg, #ff2d00, #ff7a00);
      color: #fff;
      font-size: 1.1rem;
    }

    .tip {
      margin-top: 20px;
      font-size: .78rem;
      opacity: .6;
      line-height: 1.6;
    }

    .wechat-tip {
      display: none;
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,.75);
      z-index: 999;
      color: #fff;
      text-align: center;
      padding-top: 60px;
      font-size: 1.05rem;
      line-height: 2;
    }
    .wechat-tip.show { display: block; }
    .arrow { font-size: 2.5rem; }

    .success-msg {
      display: none;
      margin-top: 16px;
      padding: 10px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      font-size: .9rem;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>

<div class="box" id="mainBox">
  <div class="icon">🛒</div>
  <h2>正在前往淘宝店铺</h2>
  <p class="sub">请选择打开方式</p>

  <a class="btn btn-primary" id="btnApp">
    📱 打开手机淘宝 App
  </a>

  <a class="btn btn-taokouling" id="btnTK">
    🔑 复制淘口令（推荐）
  </a>

  <a class="btn btn-secondary" id="btnWeb">
    🌐 在浏览器中查看
  </a>

  <p class="tip" id="tipText">复制淘口令后，打开淘宝 App 自动弹出店铺</p>
  <div class="success-msg" id="successMsg">✅ 淘口令已复制！<br/>请打开手机淘宝 App</div>
</div>

<div class="wechat-tip" id="wechatTip">
  <div class="arrow">↗️</div>
  请点击右上角<br/>选择「在浏览器打开」<br/>即可打开淘宝 App
</div>

<script>
/*
 * 淘宝店铺跳转方案
 * 店铺：激活办公室（shop515102705）
 *
 * 可靠方案优先级：
 * 1. 淘口令 → 用户复制后打开淘宝自动弹出（最可靠）
 * 2. taobao:// schema → 直接唤起 App（部分机型有效）
 * 3. https:// 链接 → 浏览器打开，提示"打开App"
 */

// ===== 请替换成你的真实淘口令 =====
// 获取方式：手机淘宝 → 店铺 → 分享 → 复制口令
const TAO_KOU_LING = '78eAGBgiY80xS💲 RIumfvgKR02Togn CZ007 激活办公室';
// 淘短链（备用）
const TAO_SHORT_URL = 'https://m.tb.cn/h.RIumfvgKR02Togn';
// 店铺 ID
const SHOP_ID = '515102705';
// 店铺直接访问 URL（手机浏览器用）
const SHOP_URL_MOBILE = 'https://shop' + SHOP_ID + '.m.taobao.com';

const ua = navigator.userAgent;
const isWechat  = /MicroMessenger/i.test(ua);
const isAndroid = /Android/i.test(ua);
const isIOS     = /iPhone|iPad|iPod/i.test(ua);
const isMobile  = isAndroid || isIOS;

/* ===== 按钮1：打开手机淘宝 App ===== */
document.getElementById('btnApp').addEventListener('click', function(e) {
  e.preventDefault();

  if (isWechat) {
    document.getElementById('wechatTip').classList.add('show');
    return;
  }

  if (isMobile) {
    // 方法1：taobao:// schema（淘宝官方深度链接）
    var deepLink = 'taobao://shop.taobao.com/shop/shop_index.htm?shop_id=' + SHOP_ID;
    window.location.href = deepLink;

    // 1.5秒后检测是否唤起成功
    setTimeout(function() {
      if (!document.hidden) {
        // 唤起失败，跳手机版店铺（浏览器会提示打开App）
        window.location.href = SHOP_URL_MOBILE;
      }
    }, 1500);
  } else {
    // 电脑：打开淘宝店铺页
    window.open('https://shop' + SHOP_ID + '.taobao.com', '_blank');
  }
});

/* ===== 按钮2：复制淘口令（最推荐）===== */
document.getElementById('btnTK').addEventListener('click', function(e) {
  e.preventDefault();
  copyText(TAO_KOU_LING, '淘口令已复制！\n打开手机淘宝 App 自动弹出店铺');
});

/* ===== 按钮3：在浏览器中查看 ===== */
document.getElementById('btnWeb').addEventListener('click', function(e) {
  e.preventDefault();
  if (isMobile) {
    // 手机：打开淘短链（淘宝会在App内打开）
    window.location.href = TAO_SHORT_URL;
  } else {
    window.open('https://shop' + SHOP_ID + '.taobao.com', '_blank');
  }
});

/* ===== 复制函数 ===== */
function copyText(text, successMsg) {
  // 先尝试淘口令专用复制（含 emoji，需要特殊处理）
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  textarea.style.fontSize = '16px'; // 防止 iOS 缩放
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    var success = document.execCommand('copy');
    document.body.removeChild(textarea);
    if (success) {
      showSuccess(successMsg);
    } else {
      promptCopy(text, successMsg);
    }
  } catch(e) {
    document.body.removeChild(textarea);
    promptCopy(text, successMsg);
  }
}

function showSuccess(msg) {
  var el = document.getElementById('successMsg');
  el.textContent = '✅ 已复制！\n请打开手机淘宝 App';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 4000);
  // 同时尝试唤起淘宝
  if (isMobile && !isWechat) {
    setTimeout(function() {
      window.location.href = 'taobao://';
    }, 500);
  }
}

function promptCopy(text, msg) {
  // 长按照复制
  var input = document.createElement('input');
  input.value = text;
  input.style.position = 'fixed';
  input.style.opacity = '0';
  document.body.appendChild(input);
  input.focus();
  input.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(input);
  alert('已复制！\n请打开手机淘宝 App');
}

/* ===== 微信提示关闭 ===== */
document.getElementById('wechatTip').addEventListener('click', function() {
  this.classList.remove('show');
});

/* ===== 页面加载后自动尝试唤起（可选）===== */
// 延迟 1 秒，让用户先看到页面
if (isMobile && !isWechat) {
  setTimeout(function() {
    // 静默尝试唤起，不强制跳转
    var hiddenBefore = document.hidden;
    window.location.href = 'taobao://shop.taobao.com/shop/shop_index.htm?shop_id=' + SHOP_ID;
    setTimeout(function() {
      // 如果没唤起，不做任何事，等用户点击
    }, 1000);
  }, 1000);
}
</script>

</body>
</html>
