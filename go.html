<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>跳转到淘宝店铺</title>
  <!-- 禁止被百度收录跳转页 -->
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #ff5000 0%, #ff6900 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 24px;
      max-width: 380px;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.3rem; margin-bottom: 12px; }
    p { opacity: .85; font-size: .9rem; margin-bottom: 24px; line-height: 1.6; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .8; }
    .btn-primary {
      background: #fff;
      color: #ff5000;
    }
    .btn-secondary {
      background: rgba(255,255,255,.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,.4);
    }

    .copy-box {
      background: rgba(0,0,0,.15);
      border-radius: 10px;
      padding: 12px 16px;
      margin: 12px 0;
      word-break: break-all;
      font-size: .85rem;
      opacity: .9;
    }

    .tip {
      margin-top: 20px;
      font-size: .78rem;
      opacity: .6;
    }
  </style>
</head>
<body>
<div class="box" id="main">
  <div class="icon">🛒</div>
  <h2 id="title">正在打开淘宝店铺…</h2>
  <p id="desc">如果未自动跳转，请点击下方按钮</p>

  <a class="btn btn-primary" id="btnApp" href="#" style="display:none">📱 打开手机淘宝</a>
  <a class="btn btn-secondary" id="btnWeb" href="#" style="display:none">🌐 浏览器打开</a>

  <div class="copy-box" id="copyBox" style="display:none">
    <div>淘口令（复制后打开淘宝）：</div>
    <div id="taoCode" style="font-weight:700;margin-top:4px;"></div>
    <button class="btn btn-secondary" id="btnCopy" style="margin-top:10px;font-size:.9rem;">📋 复制淘口令</button>
  </div>

  <div class="tip" id="wechatTip" style="display:none">💡 微信内无法直接跳转，请点击右上角「在浏览器中打开」</div>
</div>

<div id="success" style="display:none;text-align:center;padding:40px 24px;">
  <div class="icon">✅</div>
  <h2>正在跳转中…</h2>
  <p>如果长时间未响应，请检查是否安装了手机淘宝App</p>
  <a class="btn btn-secondary" id="retryBtn" href="#">🔄 重新尝试</a>
</div>

<script>
(function () {
  // ── 你的淘宝店铺信息 ──
  var SHOP_ID   = '515102705';
  var SHOP_URL  = 'https://shop515102705.taobao.com';
  var SHOP_MURL = 'https://shop.m.taobao.com/shop/shop_index.htm?shop_id=' + SHOP_ID;
  // 店铺淘口令文案（如果知道具体口令可替换）
  var TAO_CODE = '39₴3X2oWFgMlkJ£ https://m.tb.cn/h.xxxxx  正版Office激活码 Windows系统密钥';

  // ── 设备检测 ──
  var ua       = navigator.userAgent;
  var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(ua);
  var isIOS    = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid= /Android/i.test(ua);
  var isWechat = /MicroMessenger/i.test(ua);
  var isQQ     = /QQ\//i.test(ua);

  var $id      = function(id) { return document.getElementById(id); };

  // ── 微信/QQ 内：显示提示 ──
  if (isWechat || isQQ) {
    $id('title').textContent   = '请使用浏览器打开';
    $id('desc').textContent    = '微信/QQ内无法直接跳转淘宝，请按下方说明操作';
    $id('wechatTip').style.display = 'block';
    $id('btnWeb').href         = SHOP_MURL;
    $id('btnWeb').textContent  = '🌐 手机浏览器打开';
    $id('btnWeb').style.display = 'inline-block';
    $id('copyBox').style.display = 'block';
    $id('taoCode').textContent = TAO_CODE;
    $id('btnCopy').onclick = function() {
      copyText(TAO_CODE);
      $id('btnCopy').textContent = '✅ 已复制，打开淘宝即可';
    };
    return;
  }

  // ── 桌面端：直接跳转网页 ──
  if (!isMobile) {
    window.location.href = SHOP_URL;
    return;
  }

  // ── 手机浏览器：尝试唤起App ──

  // 显示按钮（兜底）
  $id('btnApp').href        = SHOP_MURL;
  $id('btnApp').style.display = 'inline-block';
  $id('btnWeb').href        = SHOP_URL;
  $id('btnWeb').style.display = 'inline-block';

  // ── 策略1: iframe 唤起（不跳转页面，更温和） ──
  function openApp(murl) {
    try {
      // Android: 用 intent 方式
      if (isAndroid) {
        var iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = 'intent://' + murl.replace('https://','') +
          '#Intent;scheme=https;package=com.taobao.taobao;S.browser_fallback_url=' +
          encodeURIComponent(SHOP_MURL) + ';end';
        document.body.appendChild(iframe);
        setTimeout(function() {
          iframe.parentNode && iframe.parentNode.removeChild(iframe);
        }, 5000);
      }
      // iOS: 直接跳转 m.taobao.com（iOS 会尝试 Universal Link）
      else {
        window.location.href = murl;
      }
    } catch(e) {
      window.location.href = murl;
    }
  }

  // ── 自动尝试 ──
  var startTime = Date.now();
  openApp(SHOP_MURL);

  // 如果 2.5 秒后还在当前页面，说明没唤起成功，显示手动按钮
  setTimeout(function() {
    if (Date.now() - startTime > 2000) {
      $id('title').textContent = '即将打开店铺';
      $id('desc').textContent  = '点击下方按钮前往';
    }
  }, 2500);

  // ── 复制辅助 ──
  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }

  // ── 重试按钮 ──
  $id('retryBtn').onclick = function(e) {
    e.preventDefault();
    openApp(SHOP_MURL);
  };

})();
</script>
</body>
</html>
