<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>前往店铺</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #ff5000 0%, #ff6900 100%);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .box { text-align: center; padding: 40px 24px; max-width: 380px; width: 100%; }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.2rem; margin-bottom: 20px; }
    .card {
      background: rgba(255,255,255,0.12);
      border-radius: 16px; padding: 20px;
      margin: 16px 0; text-align: left;
      line-height: 1.8;
    }
    .card .big { font-size: 1.5rem; font-weight: 700; color: #FFD700; display: block; margin: 8px 0; }
    .btn {
      display: block; width: 100%; padding: 14px; border-radius: 50px;
      font-size: 1.05rem; font-weight: 700; text-decoration: none;
      cursor: pointer; border: none; margin: 8px 0;
      transition: opacity .2s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: #fff; color: #ff5000; }
    .btn-secondary { background: rgba(255,255,255,.18); color: #fff; border: 1.5px solid rgba(255,255,255,.45); }
    .badge { display:inline-block; background:#FFD700; color:#cc3300; padding:3px 10px; border-radius:10px; font-size:.75rem; font-weight:700; margin-left:6px; vertical-align:middle; }
  </style>
</head>
<body>

<div class="box">
  <div class="icon">🛒</div>
  <h2>前往店铺购买</h2>

  <!-- 卡片：店铺信息 -->
  <div class="card">
    <span style="font-size:.85rem;opacity:.8;">店铺地址</span>
    <span class="big">shop515102705.taobao.com</span>
    <span style="font-size:.8rem;opacity:.7;">复制链接 → 打开淘宝 → 粘贴搜索</span>
  </div>

  <!-- 按钮 -->
  <a class="btn btn-primary" id="btnCopy">
    📋 复制店铺链接
  </a>

  <a class="btn btn-secondary" id="btnOpen">
    📱 打开手机淘宝
  </a>

  <p style="margin-top:20px;font-size:.78rem;opacity:.6;line-height:1.8;">
    ⚠️ 如跳转后要求登录<br/>
    <b>请使用「复制店铺链接」方式</b><br/>
    复制后打开淘宝粘贴即可
  </p>
</div>

<script>
var SHOP_URL = 'https://shop.m.taobao.com/shop/shop_index.htm?shop_id=515102705';

document.getElementById('btnCopy').addEventListener('click', function(e) {
  e.preventDefault();
  copyText(SHOP_URL, '链接已复制！\n请打开手机淘宝 App → 粘贴到搜索框 → 进入店铺');
});

document.getElementById('btnOpen').addEventListener('click', function(e) {
  e.preventDefault();
  // 先尝试 taobao:// 协议
  window.location.href = 'taobao://shop.m.taobao.com/shop/shop_index.htm?shop_id=515102705';
  // 1.5秒后如果不成功，用浏览器打开
  setTimeout(function() {
    if (!document.hidden) {
      window.open(SHOP_URL, '_blank');
    }
  }, 1500);
});

function copyText(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { alert(msg); })
      .catch(function() { fallbackCopy(text, msg); });
  } else { fallbackCopy(text, msg); }
}

function fallbackCopy(text, msg) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); alert(msg); }
  catch(e) { prompt('请手动复制：', text); }
  document.body.removeChild(ta);
}
</script>
</body>
</html>
