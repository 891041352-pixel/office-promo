<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>正在前往淘宝店铺...</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #ff5000 0%, #ff6900 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .sub { opacity: .8; font-size: .85rem; margin-bottom: 28px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: #fff; color: #ff5000; }
    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.45);
    }
    .tip {
      margin-top: 20px;
      font-size: .78rem;
      opacity: .6;
      line-height: 1.6;
    }
    .wechat-tip {
      display: none;
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,.75);
      z-index: 999;
      color: #fff;
      text-align: center;
      padding-top: 60px;
      font-size: 1.05rem;
      line-height: 2;
    }
    .wechat-tip.show { display: block; }
    .arrow { font-size: 2.5rem; }
  </style>
</head>
<body>

<div class="box" id="mainBox">
  <div class="icon">🛒</div>
  <h2>正在前往淘宝店铺</h2>
  <p class="sub">请选择打开方式</p>

  <a class="btn btn-primary" id="btnApp" href="javascript:void(0)">
    📱 打开手机淘宝 App
  </a>

  <a class="btn btn-secondary" id="btnWeb" href="javascript:void(0)">
    🌐 在浏览器中查看店铺
  </a>

  <a class="btn btn-secondary" id="btnCopy" href="javascript:void(0)">
    📋 复制店铺链接
  </a>

  <p class="tip">如未安装淘宝 App，请选择「在浏览器中查看」</p>
</div>

<div class="wechat-tip" id="wechatTip">
  <div class="arrow">↗️</div>
  请点击右上角<br/>选择「在浏览器打开」<br/>即可打开淘宝 App
</div>

<script>
/*
 * 淘宝店铺深度链接方案
 * 店铺 ID: 515102705
 * 店铺首页（无需登录，可直接浏览宝贝）：
 *   https://shop515102705.taobao.com
 * 店铺所有宝贝列表页：
 *   https://shop515102705.taobao.com/search.htm
 */

// 淘宝店铺直接访问链接（首页，显示所有宝贝，无需登录）
const SHOP_HOME   = 'https://shop515102705.taobao.com';
// 店铺商品列表页（所有宝贝）
const SHOP_ITEMS  = 'https://shop515102705.taobao.com/search.htm';
// 手机版淘宝店铺首页（无需登录可浏览）
const SHOP_MOBILE = 'https://shop515102705.m.taobao.com';

// 淘宝 App 深度链接（淘宝官方 schema）
// 打开指定店铺首页
const TAOBAO_SHOP_DEEP = 'taobao://shop.taobao.com/shop/shop_index.htm?shop_id=515102705';

const ua = navigator.userAgent;
const isWechat  = /MicroMessenger/i.test(ua);
const isAndroid = /Android/i.test(ua);
const isIOS     = /iPhone|iPad|iPod/i.test(ua);
const isMobile  = isAndroid || isIOS;

/* ===== 按钮1：打开手机淘宝 App ===== */
document.getElementById('btnApp').addEventListener('click', function() {
  if (isWechat) {
    document.getElementById('wechatTip').classList.add('show');
    return;
  }
  if (isMobile) {
    // 先尝试 taobao:// schema 唤起
    window.location.href = TAOBAO_SHOP_DEEP;
    // 1.5 秒后检测是否成功唤起
    setTimeout(function() {
      if (!document.hidden) {
        // 唤起失败，跳手机版店铺（会提示打开App）
        window.location.href = SHOP_MOBILE;
      }
    }, 1500);
  } else {
    // 电脑：直接打开店铺首页
    window.open(SHOP_HOME, '_blank');
  }
});

/* ===== 按钮2：在浏览器中查看 ===== */
document.getElementById('btnWeb').addEventListener('click', function() {
  if (isMobile) {
    // 手机浏览器：直接去手机版店铺首页（无需登录可浏览宝贝）
    window.location.href = SHOP_MOBILE;
  } else {
    window.open(SHOP_HOME, '_blank');
  }
});

/* ===== 按钮3：复制店铺链接 ===== */
document.getElementById('btnCopy').addEventListener('click', function() {
  var textToCopy = isMobile ? SHOP_MOBILE : SHOP_HOME;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(textToCopy).then(function() {
      alert('链接已复制！\n请打开手机淘宝 App，粘贴到搜索框');
    }).catch(function() {
      fallbackCopy(textToCopy);
    });
  } else {
    fallbackCopy(textToCopy);
  }
});

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    alert('链接已复制！\n请打开手机淘宝 App 粘贴到搜索框');
  } catch(e) {
    prompt('请手动复制以下链接：', text);
  }
  document.body.removeChild(ta);
}

/* ===== 点击微信提示关闭 ===== */
document.getElementById('wechatTip').addEventListener('click', function() {
  this.classList.remove('show');
});
</script>

</body>
</html>
