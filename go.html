<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>正在前往淘宝店铺...</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #ff5000 0%, #ff6900 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .sub { opacity: .8; font-size: .85rem; margin-bottom: 28px; line-height: 1.6; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .7; }
    .btn-primary { background: #fff; color: #ff5000; }
    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.45);
    }
    .tip {
      margin-top: 20px;
      font-size: .78rem;
      opacity: .6;
      line-height: 1.6;
    }
    .wechat-tip {
      display: none;
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,.75);
      z-index: 999;
      color: #fff;
      text-align: center;
      padding-top: 60px;
      font-size: 1.05rem;
      line-height: 2;
    }
    .wechat-tip.show { display: block; }
    .arrow { font-size: 2.5rem; }
    #copyOk { display:none; margin-top:12px; font-size:.85rem; opacity:.9; }
  </style>
</head>
<body>

<div class="box" id="mainBox">
  <div class="icon">🛒</div>
  <h2>正在前往淘宝店铺</h2>
  <p class="sub">点击按钮，自动复制口令并打开淘宝</p>

  <!-- 主按钮：一键复制+打开 -->
  <a class="btn btn-primary" id="btnOneTap">
    📱 一键打开淘宝（复制口令+打开App）
  </a>

  <a class="btn btn-secondary" id="btnCopy">
    📋 仅复制淘口令
  </a>

  <a class="btn btn-secondary" id="btnWeb">
    🌐 在浏览器中打开（需登录）
  </a>

  <p class="tip">
    点击「一键打开淘宝」后：<br/>
    ① 淘口令已自动复制<br/>
    ② 淘宝App会自动打开并识别口令<br/>
    如未安装淘宝App，请选择「在浏览器中打开」
  </p>
  <p id="copyOk">✅ 淘口令已复制！淘宝App正在打开...</p>
</div>

<div class="wechat-tip" id="wechatTip">
  <div class="arrow">↗️</div>
  请点击右上角<br/>选择「在浏览器打开」<br/>即可打开淘宝 App
</div>

<script>
// ====== 配置区（请按需修改）======
// 淘口令：从淘宝App分享 → 复制链接 获取
var TAO_KOU_LING = '78eAGBgiY80xS';
// 店铺短链（备用）
var SHORT_URL = 'https://m.tb.cn/h.RIumfvgKR02Togn';
// ==================================

var ua       = navigator.userAgent;
var isWechat = /MicroMessenger/i.test(ua);
var isAndroid = /Android/i.test(ua);
var isIOS    = /iPhone|iPad|iPod/i.test(ua);
var isMobile = isAndroid || isIOS;

// 复制淘口令
function copyToken(cb) {
  var done = function() {
    document.getElementById('copyOk').style.display = 'block';
    setTimeout(function() {
      document.getElementById('copyOk').style.display = 'none';
    }, 5000);
    if (cb) cb();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(TAO_KOU_LING).then(done).catch(function() {
      fallbackCopy(TAO_KOU_LING, done);
    });
  } else {
    fallbackCopy(TAO_KOU_LING, done);
  }
}

function fallbackCopy(text, cb) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    if (cb) cb();
  } catch(e) {
    prompt('请手动复制以下淘口令：', text);
  }
  document.body.removeChild(ta);
}

// 打开淘宝App（多种方式尝试）
function openTaobao() {
  // 方式1：taobao:// 协议（直接唤起）
  // 用通用格式，让淘宝App自己处理
  var deepLinks = [
    'taobao://m.taobao.com',                          // 打开淘宝首页
    'taobao://shop.taobao.com/shop/shop_index.htm?shop_id=515102705',
    'alipays://platformapi/startapp?appId=20000001'   // 支付宝里打开淘宝（备用）
  ];
  // 逐个尝试
  var idx = 0;
  function tryNext() {
    if (idx >= deepLinks.length) return;
    window.location.href = deepLinks[idx];
    idx++;
    setTimeout(tryNext, 600);
  }
  tryNext();
}

// ====== 按钮事件 ======

// 【一键打开】先复制口令，再打开淘宝App
document.getElementById('btnOneTap').addEventListener('click', function(e) {
  e.preventDefault();
  if (isWechat) {
    document.getElementById('wechatTip').classList.add('show');
    return;
  }
  // 先复制
  copyToken(function() {
    // 复制完后打开淘宝
    setTimeout(openTaobao, 300);
  });
});

// 【仅复制】
document.getElementById('btnCopy').addEventListener('click', function(e) {
  e.preventDefault();
  copyToken();
});

// 【浏览器打开】
document.getElementById('btnWeb').addEventListener('click', function(e) {
  e.preventDefault();
  window.open(SHORT_URL, '_blank');
});

// 页面加载后，手机端自动执行一键操作（延迟1秒，让用户看到页面）
if (isMobile && !isWechat) {
  setTimeout(function() {
    copyToken(function() {
      setTimeout(openTaobao, 400);
    });
  }, 1000);
}

// 关闭微信提示
document.getElementById('wechatTip').addEventListener('click', function() {
  this.classList.remove('show');
});
</script>
</body>
</html>
